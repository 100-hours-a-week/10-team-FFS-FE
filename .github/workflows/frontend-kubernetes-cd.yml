name: Frontend S3 CD (V3)

on:
  workflow_run:
    workflows: ["Frontend S3 CI (V3)"]
    types: [completed]
    branches: [dev, main]

jobs:
  cd:
    name: CD - Production
    runs-on: ubuntu-latest
    # CI 성공 + push 이벤트일 때만 실행 (PR은 제외)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-v3
          path: build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # index.html은 캐시 없이, 나머지 정적 파일은 1년 캐시
      - name: Deploy to S3
        id: s3_deploy
        run: |
          aws s3 sync build/ s3://klosetlab-kubernetes-frontend \
            --delete \
            --exclude "index.html"

          aws s3 cp build/index.html s3://klosetlab-kubernetes-frontend/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        id: cf_invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1HEIT0X45QA2R \
            --paths "/*"

      - name: Notify Discord - Success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Frontend S3 CD Bot (V3)"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          embed-title: "✅ Frontend 배포 성공 (Production S3 V3)"
          embed-description: |
            **브랜치:** `${{ github.event.workflow_run.head_branch }}`
            **커밋:** `${{ github.event.workflow_run.head_sha }}`
            **실행자:** ${{ github.event.workflow_run.triggering_actor.login }}

            • S3 Sync: ${{ steps.s3_deploy.outcome }}
            • CloudFront Invalidation: ${{ steps.cf_invalidation.outcome }}

      - name: Notify Discord - Failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Frontend S3 CD Bot (V3)"
          avatar-url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          embed-title: "❌ Frontend 배포 실패 (Production S3 V3)"
          embed-description: |
            **브랜치:** `${{ github.event.workflow_run.head_branch }}`
            **커밋:** `${{ github.event.workflow_run.head_sha }}`
            **실행자:** ${{ github.event.workflow_run.triggering_actor.login }}

            • S3 Sync: ${{ steps.s3_deploy.outcome }}
            • CloudFront Invalidation: ${{ steps.cf_invalidation.outcome }}