name: Frontend CI/CD - Staging

on:
  workflow_dispatch: # v2(S3)로 전환 후 비활성화

env:
  BUILD_DIR: /var/www/frontend

jobs:
  # ==================== CI Job ====================
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      # - name: Run lint
      #   id: lint
      #   run: npm run lint

      - name: Build project
        id: build
        env:
          REACT_APP_BASE_URL_DEV: ${{ secrets.REACT_APP_BASE_URL_DEV }}
          REACT_APP_KAKAO_CLIENT_ID: ${{ secrets.REACT_APP_KAKAO_CLIENT_ID }}
          REACT_APP_KAKAO_REDIRECT_URI_DEV: ${{ secrets.REACT_APP_KAKAO_REDIRECT_URI_DEV }}
          REACT_APP_CHAT_BASE_URL_DEV: ${{ secrets.V2_STAGING_REACT_APP_CHAT_BASE_URL }}
          REACT_APP_CHAT_BASE_URL_PROD: ${{ secrets.V2_PROD_REACT_APP_CHAT_BASE_URL }}
        run: CI=false npm run build

      - name: Run tests
        id: tests
        run: npm test -- --watch=false --passWithNoTests

      # dev 브랜치에 push된 경우에만 artifact 저장
      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-dev
          path: build
          retention-days: 7

      - name: Notify Discord - CI Success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Frontend CI Bot"
          embed-title: "✅ Frontend CI 성공"
          embed-description: |
            **이벤트:** ${{ github.event_name }}
            **브랜치:** `${{ github.ref_name }}`
            **실행자:** ${{ github.actor }}

            • Install: ${{ steps.install.outcome }}
            • ESLint: ${{ steps.lint.outcome }}
            • Build: ${{ steps.build.outcome }}
            • Tests: ${{ steps.tests.tests.outcome }}

      - name: Notify Discord - CI Failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Frontend CI Bot"
          embed-title: "❌ Frontend CI 실패"
          embed-description: |
            **이벤트:** ${{ github.event_name }}
            **브랜치:** `${{ github.ref_name }}`
            **실행자:** ${{ github.actor }}

            • Install: ${{ steps.install.outcome }}
            • ESLint: ${{ steps.lint.outcome }}
            • Build: ${{ steps.build.outcome }}
            • Tests: ${{ steps.tests.outcome }}

  # ==================== CD Job ====================
  cd:
    name: Deploy to Staging
    needs: ci
    # dev 브랜치에 push된 경우에만 실행
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-dev
          path: ./build

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "build/*"
          target: "/tmp/frontend-staging"
          strip_components: 1

      - name: Deploy & Health Check
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Deploy new version"
            sudo rm -rf ${{ env.BUILD_DIR }}/*
            sudo mkdir -p ${{ env.BUILD_DIR }}
            sudo mv /tmp/frontend-staging/* ${{ env.BUILD_DIR }}/
            sudo chown -R www-data:www-data ${{ env.BUILD_DIR }}

            echo "🔄 Reload nginx"
            sudo nginx -t && sudo systemctl reload nginx
            sleep 2

            echo "🩺 Health check"
            curl -f http://localhost/ || exit 1

      - name: Notify Discord - CD Success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Frontend CD Bot"
          embed-title: "✅ Staging 배포 성공"
          embed-description: |
            **브랜치:** `${{ github.ref_name }}`
            **실행자:** ${{ github.actor }}
            **커밋:** `${{ github.sha }}`
            **환경:** Staging

      - name: Notify Discord - CD Failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "Frontend CD Bot"
          embed-title: "❌ Staging 배포 실패"
          embed-description: |
            **브랜치:** `${{ github.ref_name }}`
            **실행자:** ${{ github.actor }}
            **커밋:** `${{ github.sha }}`
            **환경:** Staging
            
            로그를 확인하세요.